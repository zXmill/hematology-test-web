<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hematology Clinical Mastery (Koas)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #1a1a24;
  --accent-crimson: #dc2626;
  --accent-crimson-glow: rgba(220, 38, 38, 0.3);
  --accent-teal: #14b8a6;
  --accent-amber: #f59e0b;
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border-subtle: rgba(148, 163, 184, 0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 30%, rgba(220, 38, 38, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(20, 184, 166, 0.05) 0%, transparent 50%),
    radial-gradient(circle at 50% 100%, rgba(220, 38, 38, 0.03) 0%, transparent 40%);
  background-attachment: fixed;
}

.title-font {
  font-family: 'Space Grotesk', sans-serif;
}

/* Glass Card */
.glass-card {
  background: linear-gradient(145deg, rgba(26, 26, 36, 0.9) 0%, rgba(18, 18, 26, 0.95) 100%);
  border: 1px solid var(--border-subtle);
  backdrop-filter: blur(20px);
  box-shadow:
    0 25px 50px -12px rgba(0, 0, 0, 0.5),
    0 0 0 1px rgba(255, 255, 255, 0.02) inset;
}

/* Animated Progress Ring */
.progress-ring {
  position: relative;
  width: 60px;
  height: 60px;
}

.progress-ring svg {
  transform: rotate(-90deg);
}

.progress-ring-circle {
  fill: none;
  stroke-width: 4;
  stroke-linecap: round;
}

.progress-ring-bg {
  stroke: rgba(148, 163, 184, 0.1);
}

.progress-ring-fill {
  stroke: var(--accent-crimson);
  stroke-dasharray: 157;
  stroke-dashoffset: 157;
  transition: stroke-dashoffset 0.5s ease-out;
  filter: drop-shadow(0 0 6px var(--accent-crimson-glow));
}

/* Option Buttons */
.option-btn {
  position: relative;
  background: linear-gradient(145deg, rgba(30, 30, 42, 0.8) 0%, rgba(22, 22, 32, 0.9) 100%);
  border: 1px solid rgba(148, 163, 184, 0.15);
  border-radius: 12px;
  padding: 16px 20px;
  text-align: left;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}

.option-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
  transform: translateX(-100%);
  transition: transform 0.5s ease;
}

.option-btn:hover::before {
  transform: translateX(100%);
}

.option-btn:hover:not(:disabled) {
  border-color: rgba(220, 38, 38, 0.4);
  transform: translateY(-2px);
  box-shadow: 0 10px 30px -10px rgba(220, 38, 38, 0.2);
}

.option-btn.correct {
  background: linear-gradient(145deg, rgba(20, 184, 166, 0.15) 0%, rgba(20, 184, 166, 0.05) 100%);
  border-color: var(--accent-teal);
  box-shadow: 0 0 20px rgba(20, 184, 166, 0.2);
}

.option-btn.near {
  background: linear-gradient(145deg, rgba(245, 158, 11, 0.15) 0%, rgba(245, 158, 11, 0.05) 100%);
  border-color: var(--accent-amber);
}

.option-btn.wrong {
  background: linear-gradient(145deg, rgba(220, 38, 38, 0.15) 0%, rgba(220, 38, 38, 0.05) 100%);
  border-color: var(--accent-crimson);
  opacity: 0.7;
}

.option-btn:disabled {
  cursor: not-allowed;
}

.option-btn:disabled:not(.correct):not(.near):not(.wrong) {
  opacity: 0.5;
}

/* Letter Badge */
.letter-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  margin-right: 12px;
  background: rgba(148, 163, 184, 0.1);
  color: var(--text-secondary);
  transition: all 0.25s ease;
}

.option-btn:hover .letter-badge {
  background: rgba(220, 38, 38, 0.2);
  color: var(--accent-crimson);
}

.option-btn.correct .letter-badge {
  background: var(--accent-teal);
  color: white;
}

.option-btn.near .letter-badge {
  background: var(--accent-amber);
  color: white;
}

.option-btn.wrong .letter-badge {
  background: var(--accent-crimson);
  color: white;
}

/* Feedback Panel */
.feedback-panel {
  border-radius: 16px;
  padding: 20px 24px;
  animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.feedback-panel.correct {
  background: linear-gradient(145deg, rgba(20, 184, 166, 0.1) 0%, rgba(20, 184, 166, 0.05) 100%);
  border: 1px solid rgba(20, 184, 166, 0.3);
}

.feedback-panel.near {
  background: linear-gradient(145deg, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0.05) 100%);
  border: 1px solid rgba(245, 158, 11, 0.3);
}

.feedback-panel.wrong {
  background: linear-gradient(145deg, rgba(220, 38, 38, 0.1) 0%, rgba(220, 38, 38, 0.05) 100%);
  border: 1px solid rgba(220, 38, 38, 0.3);
}

/* Next Button */
.next-btn {
  background: linear-gradient(135deg, var(--accent-crimson) 0%, #b91c1c 100%);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px 32px;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3);
}

.next-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(220, 38, 38, 0.4);
}

.next-btn:active {
  transform: translateY(0);
}

/* Score Pills */
.score-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
}

.score-pill.correct {
  background: rgba(20, 184, 166, 0.15);
  color: #14b8a6;
}

.score-pill.near {
  background: rgba(245, 158, 11, 0.15);
  color: #f59e0b;
}

.score-pill.wrong {
  background: rgba(220, 38, 38, 0.15);
  color: #ef4444;
}

/* Floating particles animation */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(220, 38, 38, 0.3);
  border-radius: 50%;
  animation: float 20s infinite linear;
}

@keyframes float {
  0% {
    transform: translateY(100vh) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translateY(-100vh) rotate(720deg);
    opacity: 0;
  }
}

/* Question text styling */
.question-text {
  font-size: 17px;
  line-height: 1.7;
  color: var(--text-primary);
  font-weight: 400;
}

.question-text strong {
  color: var(--accent-crimson);
  font-weight: 600;
}

/* Case number badge */
.case-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: rgba(220, 38, 38, 0.1);
  border: 1px solid rgba(220, 38, 38, 0.2);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--accent-crimson);
  margin-bottom: 16px;
}

/* Source tag */
.source-tag {
  display: inline-block;
  padding: 3px 10px;
  background: rgba(148, 163, 184, 0.1);
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  margin-top: 12px;
}

/* Dashboard styling */
.dashboard-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  padding: 24px;
}

/* Pulse animation for progress */
@keyframes pulse-glow {
  0%, 100% {
    box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
  }
  50% {
    box-shadow: 0 0 30px rgba(220, 38, 38, 0.5);
  }
}

.pulse-glow {
  animation: pulse-glow 2s ease-in-out infinite;
}

/* Custom scrollbar */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: var(--bg-primary);
}

::-webkit-scrollbar-thumb {
  background: rgba(148, 163, 184, 0.2);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(148, 163, 184, 0.3);
}

/* Icon animations */
.icon-spin {
  animation: iconSpin 0.5s ease-out;
}

@keyframes iconSpin {
  from {
    transform: rotate(-180deg) scale(0.5);
    opacity: 0;
  }
  to {
    transform: rotate(0) scale(1);
    opacity: 1;
  }
}

/* Status indicators */
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.status-dot.active {
  background: var(--accent-crimson);
  box-shadow: 0 0 8px var(--accent-crimson);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Responsive adjustments */
@media (max-width: 640px) {
  .glass-card {
    margin: 16px;
    border-radius: 16px;
  }

  .question-text {
    font-size: 15px;
  }

  .option-btn {
    padding: 14px 16px;
  }
}
</style>
</head>

<script>
// ---------- PARTICLES ----------
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 20 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    container.appendChild(particle);
  }
}
createParticles();

// DOM Elements
const qText = document.getElementById('qText');
const optionsDiv = document.getElementById('options');
const feedback = document.getElementById('feedback');
const feedbackIcon = document.getElementById('feedbackIcon');
const feedbackTitle = document.getElementById('feedbackTitle');
const feedbackText = document.getElementById('feedbackText');
const feedbackSource = document.getElementById('feedbackSource');
const nextBtn = document.getElementById('next');
const progressText = document.getElementById('progressText');
const progressCircle = document.getElementById('progressCircle');
const progressPercent = document.getElementById('progressPercent');
const scoreCorrect = document.getElementById('scoreCorrect');
const scoreNear = document.getElementById('scoreNear');
const scoreWrong = document.getElementById('scoreWrong');

let i = 0, correct = 0, near = 0, wrong = 0;
const letters = ['A', 'B', 'C', 'D'];

function updateProgress() {
  const percent = Math.round((i / quizData.length) * 100);
  const circumference = 2 * Math.PI * 25;
  const offset = circumference - (percent / 100) * circumference;
  progressCircle.style.strokeDashoffset = offset;
  progressPercent.textContent = percent + '%';
  progressText.textContent = `${i + 1} / ${quizData.length}`;
}

function updateScore() {
  scoreCorrect.textContent = correct;
  scoreNear.textContent = near;
  scoreWrong.textContent = wrong;
}

function render() {
  const q = quizData[i];

  // Parse case number and content
  const caseMatch = q.text.match(/Kasus (\d+):\s*(.+)/);
  const caseNum = caseMatch ? caseMatch[1] : (i + 1);
  const caseContent = caseMatch ? caseMatch[2] : q.text;

  qText.innerHTML = `
    <div class="case-badge">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      Case ${caseNum}
    </div>
    <div class="text-gray-200">${caseContent}</div>
  `;

  optionsDiv.innerHTML = '';
  feedback.classList.add('hidden');
  nextBtn.classList.add('hidden');

  updateProgress();
  updateScore();

  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn w-full flex items-center';
    btn.innerHTML = `
      <span class="letter-badge">${letters[idx]}</span>
      <span class="flex-1 text-gray-200">${opt.t}</span>
    `;
    btn.onclick = () => answer(opt, btn);
    optionsDiv.appendChild(btn);
  });
}

function answer(opt, btn) {
  // Disable all buttons
  [...optionsDiv.children].forEach(b => b.disabled = true);

  // Mark selected button
  if (opt.s === 'benar') {
    btn.classList.add('correct');
    correct++;
    showFeedback('correct', opt);
  } else if (opt.s === 'mendekati') {
    btn.classList.add('near');
    near++;
    showFeedback('near', opt);
    // Highlight correct answer
    const correctIdx = quizData[i].options.findIndex(o => o.s === 'benar');
    if (correctIdx >= 0) {
      optionsDiv.children[correctIdx].classList.add('correct');
    }
  } else {
    btn.classList.add('wrong');
    wrong++;
    showFeedback('wrong', opt);
    // Highlight correct answer
    const correctIdx = quizData[i].options.findIndex(o => o.s === 'benar');
    if (correctIdx >= 0) {
      optionsDiv.children[correctIdx].classList.add('correct');
    }
  }

  updateScore();
  nextBtn.classList.remove('hidden');
}

function showFeedback(type, opt) {
  feedback.classList.remove('hidden', 'correct', 'near', 'wrong');
  feedback.classList.add('feedback-panel', type);

  const icons = {
    correct: `<svg class="w-6 h-6 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>`,
    near: `<svg class="w-6 h-6 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>`,
    wrong: `<svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>`
  };

  const titles = {
    correct: 'Correct!',
    near: 'Close...',
    wrong: 'Incorrect'
  };

  const titleColors = {
    correct: 'text-teal-400',
    near: 'text-amber-400',
    wrong: 'text-red-400'
  };

  feedbackIcon.innerHTML = icons[type];
  feedbackIcon.className = `flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center ${type === 'correct' ? 'bg-teal-500/20' : type === 'near' ? 'bg-amber-500/20' : 'bg-red-500/20'}`;
  feedbackTitle.innerHTML = `<span class="${titleColors[type]}">${titles[type]}</span>`;
  feedbackText.textContent = opt.e;
  feedbackSource.textContent = `Source: ${opt.src}`;
}

nextBtn.onclick = () => {
  i++;
  if (i < quizData.length) {
    render();
    // Smooth scroll to top of card
    document.getElementById('app').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    finish();
  }
};

// Dashboard
function finish() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('dashboard').classList.remove('hidden');

  // Chart.js defaults for dark theme
  Chart.defaults.color = '#94a3b8';
  Chart.defaults.borderColor = 'rgba(148, 163, 184, 0.1)';

  new Chart(document.getElementById('chart1'), {
    type: 'doughnut',
    data: {
      labels: ['Correct', 'Close', 'Incorrect'],
      datasets: [{
        data: [correct, near, wrong],
        backgroundColor: ['#14b8a6', '#f59e0b', '#dc2626'],
        borderWidth: 0,
        hoverOffset: 4
      }]
    },
    options: {
      responsive: true,
      cutout: '65%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { padding: 20, usePointStyle: true }
        }
      }
    }
  });

  new Chart(document.getElementById('chart2'), {
    type: 'bar',
    data: {
      labels: ['Your Score'],
      datasets: [{
        label: 'Correct Answers',
        data: [correct],
        backgroundColor: '#14b8a6',
        borderRadius: 8,
        barThickness: 60
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          beginAtZero: true,
          max: quizData.length,
          ticks: { stepSize: 50 }
        }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });
}

render();
</script>
